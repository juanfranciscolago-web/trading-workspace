# Anthropic API pricing — USD per 1M tokens (verified April 2026)
# Source: https://www.anthropic.com/pricing
#
# cache_creation_per_million uses 5-min TTL rate (1.25x input).
# For 1-hr TTL (2.00x input), override at the call site — MVP tracks 5-min as default.
#
# Batch API (is_batch_api=True): 50% discount on input + output only.
# Cache creation and cache read rates are unchanged for batch.

models:
  claude-opus-4-7:
    input_per_million: 5.00
    cache_creation_per_million: 6.25    # 1.25x input (5-min TTL)
    cached_input_per_million: 0.50      # 0.10x input (cache read)
    output_per_million: 25.00
    batch:
      input_per_million: 2.50           # 50% off standard
      output_per_million: 12.50         # 50% off standard

  claude-sonnet-4-6:
    input_per_million: 3.00
    cache_creation_per_million: 3.75
    cached_input_per_million: 0.30
    output_per_million: 15.00
    batch:
      input_per_million: 1.50
      output_per_million: 7.50

  claude-haiku-4-5-20251001:
    input_per_million: 1.00
    cache_creation_per_million: 1.25
    cached_input_per_million: 0.10
    output_per_million: 5.00
    batch:
      input_per_million: 0.50
      output_per_million: 2.50
